name: tauri-e2e-smoke

on:
  pull_request:
    paths:
      - "apps/desktop/**"
      - "crates/**"
      - "tools/scripts/**"
      - "package.json"
      - "package-lock.json"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/tauri-e2e-smoke.yml"
  push:
    branches:
      - main
      - master
    paths:
      - "apps/desktop/**"
      - "crates/**"
      - "tools/scripts/**"
      - "package.json"
      - "package-lock.json"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/tauri-e2e-smoke.yml"
  workflow_dispatch:

concurrency:
  group: tauri-e2e-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tauri-e2e-windows:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install workspace dependencies
        run: npm ci

      - name: Ensure Edge WebDriver
        shell: pwsh
        run: |
          if (-not (Get-Command msedgedriver.exe -ErrorAction SilentlyContinue)) {
            winget install --id Microsoft.EdgeDriver --silent --accept-package-agreements --accept-source-agreements
          }
          $edgeDriverPath = (Get-Command msedgedriver.exe -ErrorAction Stop).Source
          "EDGE_WEBDRIVER_PATH=$edgeDriverPath" >> $env:GITHUB_ENV

      - name: Ensure tauri-driver
        shell: pwsh
        run: |
          if (-not (Get-Command tauri-driver -ErrorAction SilentlyContinue)) {
            cargo install --locked tauri-driver
          }
          $tauriDriverPath = (Get-Command tauri-driver -ErrorAction Stop).Source
          "TAURI_DRIVER_PATH=$tauriDriverPath" >> $env:GITHUB_ENV

      - name: Run Tauri E2E smoke
        env:
          COMPANION_RUN_TAURI_E2E: "1"
        run: npm run desktop:test-e2e
